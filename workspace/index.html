<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMR サイクルタイム シミュレーター</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ===== Header ===== */
#header { background: #16213e; padding: 8px 16px; display: flex; align-items: center; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
#header h1 { font-size: 16px; font-weight: 600; color: #e94560; }

/* ===== Main Layout ===== */
#main { display: flex; flex: 1; overflow: hidden; }

/* ===== Left Pane ===== */
#left-pane { width: 280px; min-width: 40px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; transition: width 0.3s ease; overflow-y: auto; overflow-x: hidden; flex-shrink: 0; }
#left-pane.collapsed { width: 40px; }
#left-pane.collapsed .section-label, #left-pane.collapsed .param-row, #left-pane.collapsed .section-title, #left-pane.collapsed .stats-detail, #left-pane.collapsed .speed-input-group { display: none; }
#left-pane.collapsed .tool-btn span.tool-label { display: none; }
#left-pane.collapsed .tool-btn { justify-content: center; padding: 8px 0; }
#left-pane.collapsed .sim-btn span.btn-label { display: none; }
#left-pane.collapsed .sim-btn { justify-content: center; min-width: 0; padding: 6px 0; }

#toggle-pane { background: none; border: none; color: #e94560; cursor: pointer; font-size: 18px; padding: 6px 10px; width: 100%; text-align: right; flex-shrink: 0; }
#toggle-pane:hover { background: rgba(233,69,96,0.1); }
#left-pane.collapsed #toggle-pane { text-align: center; }

.pane-section { padding: 8px 12px; border-bottom: 1px solid #0f3460; }
#left-pane.collapsed .pane-section { padding: 4px 4px; }
.section-title { font-size: 11px; font-weight: 700; color: #e94560; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }

/* ===== Tool Buttons ===== */
.tool-btn { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border: none; background: none; color: #c0c0c0; cursor: pointer; width: 100%; text-align: left; border-radius: 4px; font-size: 13px; white-space: nowrap; }
.tool-btn:hover { background: rgba(233,69,96,0.15); color: #fff; }
.tool-btn.active { background: rgba(233,69,96,0.3); color: #e94560; }
.tool-icon { width: 24px; text-align: center; font-size: 14px; flex-shrink: 0; }

/* ===== Param Rows ===== */
.param-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.param-row label { font-size: 12px; color: #aaa; }
.param-row input[type="number"] { width: 70px; background: #0f3460; border: 1px solid #1a4a8a; color: #fff; padding: 3px 6px; border-radius: 3px; font-size: 12px; text-align: right; }
.param-row .unit { font-size: 11px; color: #888; margin-left: 4px; min-width: 30px; }
.param-row select { width: 150px; background: #0f3460; border: 1px solid #1a4a8a; color: #fff; padding: 4px 6px; border-radius: 3px; font-size: 12px; }

/* ===== Simulation Controls ===== */
.sim-controls { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.sim-btn { display: flex; align-items: center; gap: 4px; padding: 6px 10px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; cursor: pointer; border-radius: 4px; font-size: 13px; white-space: nowrap; }
.sim-btn:hover { background: #0f3460; }
.sim-btn.active-ff { background: #e94560; color: #fff; border-color: #e94560; }
.speed-input-group { display: flex; align-items: center; gap: 2px; margin-top: 4px; }
.speed-input-group label { font-size: 11px; color: #aaa; }
.speed-input-group input { width: 45px; background: #0f3460; border: 1px solid #1a4a8a; color: #fff; padding: 2px 4px; border-radius: 3px; font-size: 12px; text-align: right; }
.speed-display { font-size: 11px; color: #e94560; margin-top: 4px; font-weight: 600; }

/* ===== Stats ===== */
.stat-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
.stat-row .stat-label { color: #aaa; }
.stat-row .stat-value { color: #4fc3f7; font-weight: 600; font-variant-numeric: tabular-nums; }
.stats-detail { margin-top: 6px; font-size: 11px; color: #888; max-height: 120px; overflow-y: auto; }
.stats-detail .amr-stat { margin-bottom: 3px; padding: 2px 0; border-bottom: 1px solid #0f3460; }

/* ===== Right Pane (Canvas) ===== */
#right-pane { flex: 1; position: relative; background: #111; overflow: hidden; }
#canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

/* ===== Notification ===== */
#notification { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(22,33,62,0.95); border: 1px solid #e94560; border-radius: 6px; padding: 6px 14px; font-size: 12px; color: #e94560; display: none; z-index: 150; pointer-events: none; max-width: 340px; text-align: center; }
#notification.info { border-color: #4fc3f7; color: #4fc3f7; }
#notification.success { border-color: #22c55e; color: #22c55e; }

/* ===== Canvas Overlay Stats ===== */
#overlay-stats { position: absolute; bottom: 10px; right: 10px; background: rgba(22,33,62,0.9); border: 1px solid #0f3460; border-radius: 6px; padding: 8px 12px; font-size: 11px; min-width: 220px; pointer-events: none; }
#overlay-stats .os-title { font-weight: 700; color: #e94560; margin-bottom: 4px; }
#overlay-stats .os-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
#overlay-stats .os-label { color: #aaa; }
#overlay-stats .os-value { color: #4fc3f7; font-weight: 600; }

/* ===== Tooltip ===== */
[data-tooltip] { position: relative; }
#left-pane.collapsed [data-tooltip]:hover::after { content: attr(data-tooltip); position: absolute; left: 44px; top: 50%; transform: translateY(-50%); background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 100; pointer-events: none; }

/* ===== Context Menu ===== */
#context-menu { position: absolute; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; padding: 4px 0; display: none; z-index: 200; min-width: 120px; }
#context-menu .cm-item { padding: 6px 12px; font-size: 12px; cursor: pointer; color: #e0e0e0; }
#context-menu .cm-item:hover { background: rgba(233,69,96,0.2); }

/* ===== Scale Calibration Modal ===== */
#scale-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #16213e; border: 1px solid #e94560; border-radius: 8px; padding: 20px; z-index: 300; display: none; min-width: 280px; }
#scale-modal h3 { color: #e94560; margin-bottom: 12px; font-size: 14px; }
#scale-modal input { width: 100%; background: #0f3460; border: 1px solid #1a4a8a; color: #fff; padding: 6px; border-radius: 4px; margin-bottom: 12px; font-size: 14px; }
#scale-modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
#scale-modal .modal-btn { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
#scale-modal .modal-btn.primary { background: #e94560; color: #fff; }
#scale-modal .modal-btn.secondary { background: #0f3460; color: #e0e0e0; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <h1>AMR サイクルタイム シミュレーター</h1>
</div>

<div id="main">
  <!-- Left Pane -->
  <div id="left-pane">
    <button id="toggle-pane" title="パネルを折りたたむ">&laquo;</button>

    <!-- Tools Section -->
    <div class="pane-section">
      <div class="section-title">ツール</div>
      <button class="tool-btn active" data-tool="select" data-tooltip="選択/移動"><span class="tool-icon">✋</span><span class="tool-label">選択 / 移動</span></button>
      <button class="tool-btn" data-tool="image" data-tooltip="画像読込"><span class="tool-icon">📷</span><span class="tool-label">画像読込</span></button>
      <button class="tool-btn" data-tool="pickup" data-tooltip="Pickup"><span class="tool-icon" style="color:#22c55e">■</span><span class="tool-label">Pickup Station</span></button>
      <button class="tool-btn" data-tool="dropoff" data-tooltip="DropOff"><span class="tool-icon" style="color:#ef4444">■</span><span class="tool-label">DropOff Station</span></button>
      <button class="tool-btn" data-tool="home" data-tooltip="Home"><span class="tool-icon" style="color:#3b82f6">●</span><span class="tool-label">待機エリア</span></button>
      <button class="tool-btn" data-tool="waypoint" data-tooltip="Waypoint"><span class="tool-icon" style="color:#9ca3af">●</span><span class="tool-label">Waypoint</span></button>
      <button class="tool-btn" data-tool="loop-path" data-tooltip="経路作成"><span class="tool-icon" style="color:#4ade80">/</span><span class="tool-label">経路作成</span></button>
      <button class="tool-btn" data-tool="home-branch" data-tooltip="Home枝接続"><span class="tool-icon" style="color:#60a5fa">⎇</span><span class="tool-label">Home枝接続</span></button>
      <button class="tool-btn" data-tool="sync-area" data-tooltip="SyncArea作成"><span class="tool-icon" style="color:#facc15">⬠</span><span class="tool-label">SyncArea作成</span></button>
      <button class="tool-btn" data-tool="delete" data-tooltip="削除"><span class="tool-icon">🗑</span><span class="tool-label">削除</span></button>
      <button class="tool-btn" data-tool="scale" data-tooltip="スケール設定"><span class="tool-icon">📏</span><span class="tool-label">スケール設定</span></button>
      <div class="param-row" style="margin-top:8px;">
        <label for="segment-direction">経路属性</label>
        <select id="segment-direction">
          <option value="bidirectional">A↔B（両通行）</option>
          <option value="forward">A→B（片方向）</option>
          <option value="reverse">B→A（片方向）</option>
        </select>
      </div>
    </div>

    <!-- Parameters Section -->
    <div class="pane-section">
      <div class="section-title">パラメータ</div>
      <div class="param-row"><label>速度</label><div><input type="number" id="param-speed" value="1.0" min="0.1" max="5" step="0.1"><span class="unit">m/s</span></div></div>
      <div class="param-row"><label>ドッキング</label><div><input type="number" id="param-docking" value="30" min="1" max="300" step="1"><span class="unit">秒</span></div></div>
      <div class="param-row"><label>リリース</label><div><input type="number" id="param-release" value="20" min="1" max="300" step="1"><span class="unit">秒</span></div></div>
      <div class="param-row"><label>AMR台数</label><div><input type="number" id="param-amr-count" value="1" min="1" max="10" step="1"><span class="unit">台</span></div></div>
      <div class="param-row"><label>Pickup供給周期</label><div><input type="number" id="param-pickup-interval" value="20" min="1" max="600" step="1"><span class="unit">秒</span></div></div>
      <div class="param-row"><label>スケール</label><div><input type="number" id="param-scale" value="0.1" min="0.001" max="10" step="0.001"><span class="unit">m/px</span></div></div>
    </div>

    <!-- Simulation Controls -->
    <div class="pane-section">
      <div class="section-title">シミュレーション</div>
      <div class="sim-controls">
        <button class="sim-btn" id="btn-play-pause" data-tooltip="再生/一時停止"><span class="tool-icon">▶</span><span class="btn-label">再生</span></button>
        <button class="sim-btn" id="btn-fast-forward" data-tooltip="早送り"><span class="tool-icon">⏩</span><span class="btn-label">x3</span></button>
        <button class="sim-btn" id="btn-reset" data-tooltip="リセット"><span class="tool-icon">⏹</span><span class="btn-label">Reset</span></button>
      </div>
      <div class="speed-input-group">
        <label>倍速:</label>
        <input type="number" id="ff-speed-input" value="3" min="2" max="100" step="1">
      </div>
      <div class="speed-display" id="speed-display">現在: x1</div>
    </div>

    <!-- Stats Section -->
    <div class="pane-section">
      <div class="section-title">統計</div>
      <div class="stat-row"><span class="stat-label">経過時間</span><span class="stat-value" id="stat-time">00:00:00</span></div>
      <div class="stat-row"><span class="stat-label">搬送完了</span><span class="stat-value" id="stat-deliveries">0 回</span></div>
      <div class="stat-row"><span class="stat-label">平均CT</span><span class="stat-value" id="stat-avg-ct">-- 秒</span></div>
      <div class="stat-row"><span class="stat-label">スループット</span><span class="stat-value" id="stat-throughput">-- 回/h</span></div>
      <div class="stats-detail" id="stats-detail"></div>
    </div>
  </div>

  <!-- Right Pane -->
  <div id="right-pane">
    <canvas id="canvas"></canvas>
    <div id="notification"></div>
    <div id="overlay-stats" style="display:none;">
      <div class="os-title">AMR 詳細</div>
      <div id="overlay-amr-stats"></div>
    </div>
    <div id="context-menu">
      <div class="cm-item" data-action="delete">削除</div>
    </div>
    <div id="scale-modal">
      <h3>スケール設定</h3>
      <p style="font-size:12px;color:#aaa;margin-bottom:8px;">2点間の実際の距離を入力してください</p>
      <input type="number" id="scale-distance-input" placeholder="距離 (m)" min="0.1" step="0.1">
      <div class="modal-btns">
        <button class="modal-btn secondary" id="scale-cancel">キャンセル</button>
        <button class="modal-btn primary" id="scale-ok">設定</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="image-input" accept="image/*" style="display:none;">

<script>
// ============================================================
// DATA LAYER - State Store
// ============================================================
const state = {
  nodes: new Map(),
  segments: new Map(),
  adjacency: new Map(),
  loopSegments: new Set(),      // ループ部セグメントID集合
  homeSegments: new Set(),      // Home枝セグメントID集合
  loopOrder: [],                // ループ部ノードの順序配列
  syncAreas: [],                // 排他進入エリア [{id, points:[{x,y}], occupantAmrId}]
  amrs: [],
  config: {
    scale: 0.1,
    amrSpeed: 1.0,
    dockingTime: 30,
    releaseTime: 20,
    amrCount: 1,
    pickupSupplyInterval: 20,
    simSpeed: 1,
    ffSpeed: 3
  },
  bgImage: null,
  nodeCounter: 0,
  segCounter: 0,
  syncAreaCounter: 0,
  segmentDirectionMode: 'bidirectional',
  simTime: 0,
  running: false,
  paused: false,
  totalDeliveries: 0,
  cycleRecords: [],
  segmentReservation: new Map(),
  pickupSupply: new Map()
};

// ============================================================
// UTILITY
// ============================================================
function pointToSegmentDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx*dx + dy*dy;
  if (lenSq === 0) return Math.hypot(px - ax, py - ay);
  let t = ((px - ax)*dx + (py - ay)*dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (ax + t*dx), py - (ay + t*dy));
}

function pointInPolygon(x, y, points) {
  let inside = false;
  for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
    const xi = points[i].x, yi = points[i].y;
    const xj = points[j].x, yj = points[j].y;
    const intersect = ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-9) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// ============================================================
// CORE - Graph Manager
// ============================================================
const graphManager = {
  addNode(type, x, y, label) {
    const id = 'n' + (++state.nodeCounter);
    const node = { id, type, x, y, label: label || this._defaultLabel(type) };
    state.nodes.set(id, node);
    state.adjacency.set(id, new Set());
    return node;
  },

  _defaultLabel(type) {
    let count = 0;
    for (const n of state.nodes.values()) { if (n.type === type) count++; }
    const names = { pickup: 'Pickup', dropoff: 'DropOff', home: 'Home', waypoint: 'WP' };
    return `${names[type]} ${String.fromCharCode(65 + count)}`;
  },

  removeNode(id) {
    const toRemove = [];
    for (const [sid, seg] of state.segments) {
      if (seg.from === id || seg.to === id) toRemove.push(sid);
    }
    toRemove.forEach(sid => this.removeSegment(sid));
    state.adjacency.delete(id);
    for (const adj of state.adjacency.values()) adj.delete(id);
    state.nodes.delete(id);
    this._rebuildLoopOrder();
  },

  // 経路セグメントを追加（自由接続）
  addLoopSegment(fromId, toId) {
    if (fromId === toId) return { ok: false, msg: '同一ノードには接続できません' };
    const nf = state.nodes.get(fromId), nt = state.nodes.get(toId);
    if (!nf || !nt) return { ok: false, msg: 'ノードが見つかりません' };

    // 重複チェック
    if (this.getSegmentBetween(fromId, toId)) return { ok: false, msg: 'すでにセグメントが存在します' };

    const seg = this._createSegment(fromId, toId, state.segmentDirectionMode);
    state.loopSegments.add(seg.id);
    this._rebuildLoopOrder();
    return { ok: true, seg };
  },

  // Home枝セグメントを追加
  addHomeSegment(loopNodeId, homeNodeId) {
    const loopNode = state.nodes.get(loopNodeId);
    const homeNode = state.nodes.get(homeNodeId);
    if (!loopNode || !homeNode) return { ok: false, msg: 'ノードが見つかりません' };

    // 型チェック
    if (homeNode.type !== 'home') return { ok: false, msg: `${homeNode.label} はHomeノードではありません` };
    const loopTypes = ['pickup', 'dropoff', 'waypoint'];
    if (!loopTypes.includes(loopNode.type)) return { ok: false, msg: `接続元はPickup/DropOff/Waypointである必要があります` };

    // Homeノードの次数チェック（リーフ必須）
    if ((state.adjacency.get(homeNodeId) || new Set()).size > 0) {
      return { ok: false, msg: `${homeNode.label} はすでに接続されています（リーフノード必須）` };
    }

    // 重複チェック
    if (this.getSegmentBetween(loopNodeId, homeNodeId)) return { ok: false, msg: 'すでにセグメントが存在します' };

    const seg = this._createSegment(loopNodeId, homeNodeId, state.segmentDirectionMode);
    state.homeSegments.add(seg.id);
    return { ok: true, seg };
  },

  _createSegment(fromId, toId, direction = 'bidirectional') {
    const id = 's' + (++state.segCounter);
    const nf = state.nodes.get(fromId), nt = state.nodes.get(toId);
    const dx = nt.x - nf.x, dy = nt.y - nf.y;
    const seg = { id, from: fromId, to: toId, direction, distance: Math.sqrt(dx*dx + dy*dy) * state.config.scale };
    state.segments.set(id, seg);
    state.adjacency.get(fromId).add(toId);
    state.adjacency.get(toId).add(fromId);
    return seg;
  },

  canTraverse(seg, fromId, toId) {
    if (!seg) return false;
    if (seg.direction === 'bidirectional') {
      return (seg.from === fromId && seg.to === toId) || (seg.from === toId && seg.to === fromId);
    }
    if (seg.direction === 'forward') return seg.from === fromId && seg.to === toId;
    if (seg.direction === 'reverse') return seg.from === toId && seg.to === fromId;
    return false;
  },

  removeSegment(id) {
    const seg = state.segments.get(id);
    if (!seg) return;
    state.adjacency.get(seg.from)?.delete(seg.to);
    state.adjacency.get(seg.to)?.delete(seg.from);
    state.segments.delete(id);
    state.loopSegments.delete(id);
    state.homeSegments.delete(id);
    state.segmentReservation.delete(id);
    this._rebuildLoopOrder();
  },

  // ループ内の次数を返す
  getLoopDegree(nodeId) {
    let deg = 0;
    for (const segId of state.loopSegments) {
      const seg = state.segments.get(segId);
      if (seg && (seg.from === nodeId || seg.to === nodeId)) deg++;
    }
    return deg;
  },

  // 経路が1本以上あるか
  isLoopComplete() {
    return state.loopSegments.size > 0;
  },

  _getLoopNodes() {
    const loopNodes = new Set();
    for (const segId of state.loopSegments) {
      const seg = state.segments.get(segId);
      if (seg) { loopNodes.add(seg.from); loopNodes.add(seg.to); }
    }
    return loopNodes;
  },

  // ループ順序配列を再構築
  _rebuildLoopOrder() {
    const loopNodes = this._getLoopNodes();
    if (loopNodes.size < 2) { state.loopOrder = [...loopNodes]; return; }

    // ループ用隣接リストを構築
    const loopAdj = new Map();
    for (const nid of loopNodes) loopAdj.set(nid, []);
    for (const segId of state.loopSegments) {
      const seg = state.segments.get(segId);
      if (seg) {
        loopAdj.get(seg.from)?.push(seg.to);
        loopAdj.get(seg.to)?.push(seg.from);
      }
    }

    // 始点からトラバース
    const start = loopNodes.values().next().value;
    const order = [start];
    let prev = null, cur = start;
    while (order.length < loopNodes.size) {
      const neighbors = loopAdj.get(cur) || [];
      const next = neighbors.find(n => n !== prev);
      if (!next) break;
      order.push(next);
      prev = cur;
      cur = next;
    }
    state.loopOrder = order;
  },

  recalcDistances() {
    for (const seg of state.segments.values()) {
      const nf = state.nodes.get(seg.from), nt = state.nodes.get(seg.to);
      if (nf && nt) {
        const dx = nt.x - nf.x, dy = nt.y - nf.y;
        seg.distance = Math.sqrt(dx*dx + dy*dy) * state.config.scale;
      }
    }
  },

  getSegmentBetween(a, b) {
    for (const seg of state.segments.values()) {
      if ((seg.from === a && seg.to === b) || (seg.from === b && seg.to === a)) return seg;
    }
    return null;
  },

  findNearNode(x, y, radius = 15) {
    let best = null, bestD = radius;
    for (const n of state.nodes.values()) {
      const d = Math.hypot(n.x - x, n.y - y);
      if (d < bestD) { bestD = d; best = n; }
    }
    return best;
  },

  findNearSegment(x, y, threshold = 8) {
    let best = null, bestD = threshold;
    for (const seg of state.segments.values()) {
      const a = state.nodes.get(seg.from), b = state.nodes.get(seg.to);
      if (!a || !b) continue;
      const d = pointToSegmentDist(x, y, a.x, a.y, b.x, b.y);
      if (d < bestD) { bestD = d; best = seg; }
    }
    return best;
  }
};

// ============================================================
// CORE - Pathfinder (Loop Trace)
// ============================================================
const pathfinder = {
  _hasPickupCart(pickupId) {
    const supply = state.pickupSupply.get(pickupId);
    return !!supply && supply.availableCarts > 0;
  },

  // 任意グラフ上の最短経路探索（Dijkstra）
  findLoopPath(startId, targetIds) {
    if (!state.nodes.has(startId)) return null;
    const targets = new Set(targetIds);
    if (targets.has(startId)) return [startId];

    const dist = new Map([[startId, 0]]);
    const prev = new Map();
    const visited = new Set();
    const queue = [startId];

    while (queue.length > 0) {
      queue.sort((a, b) => (dist.get(a) ?? Infinity) - (dist.get(b) ?? Infinity));
      const cur = queue.shift();
      if (!cur || visited.has(cur)) continue;
      visited.add(cur);
      if (targets.has(cur)) {
        const path = [];
        let node = cur;
        while (node) {
          path.push(node);
          node = prev.get(node);
        }
        return path.reverse();
      }

      const neighbors = [...(state.adjacency.get(cur) || [])];
      for (const nxt of neighbors) {
        if (visited.has(nxt)) continue;
        const seg = graphManager.getSegmentBetween(cur, nxt);
        if (!seg || !graphManager.canTraverse(seg, cur, nxt)) continue;
        const nd = (dist.get(cur) ?? Infinity) + seg.distance;
        if (nd < (dist.get(nxt) ?? Infinity)) {
          dist.set(nxt, nd);
          prev.set(nxt, cur);
          queue.push(nxt);
        }
      }
    }
    return null;
  },

  // Homeノードから目的ノードへのパス（Home枝→ループ→target）
  findFromHome(homeId, targetIds) {
    const homeAdj = [...(state.adjacency.get(homeId) || [])];
    if (!homeAdj.length) return null;
    const connectNode = homeAdj[0]; // ループ部へのゲートノード
    const homeSeg = graphManager.getSegmentBetween(homeId, connectNode);
    if (!homeSeg || !graphManager.canTraverse(homeSeg, homeId, connectNode)) return null;
    const loopPath = this.findLoopPath(connectNode, targetIds);
    if (!loopPath) return null;
    if (loopPath[0] === homeId) return loopPath;
    return [homeId, ...loopPath];
  },

  // ループ部ノードから最寄りHomeへのパス（ループ→Home枝）
  findToHome(startId, excludeHomeIds = new Set()) {
    const homes = [...state.nodes.values()].filter(n => n.type === 'home' && !excludeHomeIds.has(n.id));
    if (!homes.length) return null;

    let bestPath = null, bestDist = Infinity;
    for (const home of homes) {
      const homeAdj = [...(state.adjacency.get(home.id) || [])];
      if (!homeAdj.length) continue;
      const connectNode = homeAdj[0];
      const homeSeg = graphManager.getSegmentBetween(connectNode, home.id);
      if (!homeSeg || !graphManager.canTraverse(homeSeg, connectNode, home.id)) continue;
      const loopPath = this.findLoopPath(startId, [connectNode]);
      if (!loopPath) continue;
      const fullPath = [...loopPath, home.id];
      const dist = this._pathDistance(fullPath);
      if (dist < bestDist) { bestDist = dist; bestPath = fullPath; }
    }
    return bestPath;
  },

  // ループ部でのタスク探索（利用可能Pickupの最近傍）
  // excludeIds: 他AMRが割り当て済みのPickupIDセット
  findNearestPickupOnLoop(startId, excludeIds) {
    const targets = [...state.nodes.values()]
      .filter(n => n.type === 'pickup' && !excludeIds.has(n.id) && this._hasPickupCart(n.id))
      .map(n => n.id);
    if (!targets.length) return null;

    let bestPath = null, bestDist = Infinity;
    for (const tid of targets) {
      const path = this.findLoopPath(startId, [tid]);
      if (!path) continue;
      const dist = this._pathDistance(path);
      if (dist < bestDist) { bestDist = dist; bestPath = path; }
    }
    return bestPath;
  },

  // ループ部でのDropOff探索（最近傍）
  findNearestDropoffOnLoop(startId) {
    const targets = [...state.nodes.values()]
      .filter(n => n.type === 'dropoff')
      .map(n => n.id);
    if (!targets.length) return null;
    return this.findLoopPath(startId, targets);
  },

  // Homeからのタスク探索
  findNearestPickupFromHome(homeId, excludeIds) {
    const targets = [...state.nodes.values()]
      .filter(n => n.type === 'pickup' && !excludeIds.has(n.id) && this._hasPickupCart(n.id))
      .map(n => n.id);
    if (!targets.length) return null;
    return this.findFromHome(homeId, targets);
  },

  _pathDistance(path) {
    let d = 0;
    for (let i = 0; i < path.length - 1; i++) {
      const seg = graphManager.getSegmentBetween(path[i], path[i+1]);
      if (!seg || !graphManager.canTraverse(seg, path[i], path[i+1])) return Infinity;
      d += seg.distance;
    }
    return d;
  }
};

// ============================================================
// CORE - Collision Manager
// ============================================================
const collisionManager = {
  tryReserve(amrId, segId) {
    const current = state.segmentReservation.get(segId);
    if (!current || current === amrId) {
      state.segmentReservation.set(segId, amrId);
      return true;
    }
    return false;
  },
  release(amrId, segId) {
    if (state.segmentReservation.get(segId) === amrId) {
      state.segmentReservation.delete(segId);
    }
  },
  releaseAll(amrId) {
    for (const [sid, owner] of state.segmentReservation) {
      if (owner === amrId) state.segmentReservation.delete(sid);
    }
  }
};

// ============================================================
// CORE - Simulation Engine
// ============================================================
const simEngine = {
  _initPickupSupply() {
    state.pickupSupply.clear();
    const interval = Math.max(1, state.config.pickupSupplyInterval || 20);
    const pickups = [...state.nodes.values()].filter(n => n.type === 'pickup');
    for (const pickup of pickups) {
      state.pickupSupply.set(pickup.id, {
        availableCarts: 1,
        nextSupplyTime: interval
      });
    }
  },

  _refreshPickupSupply() {
    const interval = Math.max(1, state.config.pickupSupplyInterval || 20);
    for (const [pickupId, supply] of state.pickupSupply) {
      if (!state.nodes.has(pickupId)) {
        state.pickupSupply.delete(pickupId);
        continue;
      }
      while (state.simTime >= supply.nextSupplyTime) {
        if (supply.availableCarts < 1) supply.availableCarts = 1;
        supply.nextSupplyTime += interval;
      }
    }
  },

  _hasCartAtPickup(pickupId) {
    const supply = state.pickupSupply.get(pickupId);
    return !!supply && supply.availableCarts > 0;
  },

  _consumePickupCart(pickupId) {
    const supply = state.pickupSupply.get(pickupId);
    if (!supply || supply.availableCarts <= 0) return false;
    supply.availableCarts--;
    return true;
  },

  _syncAreasContainingPoint(x, y) {
    return state.syncAreas.filter(area => area.points.length >= 3 && pointInPolygon(x, y, area.points));
  },

  _getBlockingSyncArea(amr, nx, ny) {
    const currentAreas = this._syncAreasContainingPoint(amr.x, amr.y);
    const nextAreas = this._syncAreasContainingPoint(nx, ny);
    const currentIds = new Set(currentAreas.map(a => a.id));
    for (const area of nextAreas) {
      const entering = !currentIds.has(area.id);
      if (entering && area.occupantAmrId && area.occupantAmrId !== amr.id) {
        return area;
      }
    }
    return null;
  },


  _handleSyncAreaBlocked(amr, dt, blockingArea) {
    amr.syncBlockTimer += dt;

    const isOutsideBlockingArea = blockingArea ? !pointInPolygon(amr.x, amr.y, blockingArea.points) : false;
    if (amr.currentSegment && isOutsideBlockingArea && amr.syncBlockTimer >= 0.5) {
      collisionManager.release(amr.id, amr.currentSegment);
      amr.currentSegment = null;
    }
  },

  _updateSyncAreaOccupancy(amr, x, y) {
    for (const area of state.syncAreas) {
      if (area.points.length < 3) continue;
      const inside = pointInPolygon(x, y, area.points);
      if (inside) {
        if (!area.occupantAmrId) area.occupantAmrId = amr.id;
      } else if (area.occupantAmrId === amr.id) {
        area.occupantAmrId = null;
      }
    }
  },

  init() {
    state.amrs = [];
    state.simTime = 0;
    state.totalDeliveries = 0;
    state.cycleRecords = [];
    state.segmentReservation.clear();
    this._initPickupSupply();
    for (const area of state.syncAreas) area.occupantAmrId = null;

    const homes = [...state.nodes.values()].filter(n => n.type === 'home');
    const count = Math.min(state.config.amrCount, 10, homes.length);

    for (let i = 0; i < count; i++) {
      const home = homes[i % homes.length];
      if (!home) continue;
      state.amrs.push({
        id: 'amr_' + (i + 1),
        label: 'AMR-' + (i + 1),
        state: 'at_home',
        currentSegment: null,
        x: home.x,
        y: home.y,
        currentNodeId: home.id,
        currentPath: null,
        targetHomeId: home.id,
        pathIndex: 0,
        hasCargo: false,
        taskCount: 0,
        totalCycleTime: 0,
        cycleStartTime: null,     // Pickup到着時刻
        waitTimer: 0,
        totalWaitingTime: 0,
        waitDeadlockTimer: 0,
        syncBlockTimer: 0,
        assignedPickup: null,
        assignedDropoff: null,
        direction: 0,
        blinkTimer: 0
      });
    }
  },

  update(dt) {
    state.simTime += dt;
    this._refreshPickupSupply();
    for (const area of state.syncAreas) {
      if (area.occupantAmrId && !state.amrs.some(a => a.id === area.occupantAmrId)) area.occupantAmrId = null;
    }
    for (const amr of state.amrs) {
      this._updateAMR(amr, dt);
    }
  },

  _updateAMR(amr, dt) {
    switch (amr.state) {
      case 'at_home':         this._handleAtHome(amr); break;
      case 'moving_to_pickup':  this._handleMoving(amr, dt, 'docking'); break;
      case 'docking':           this._handleDocking(amr, dt); break;
      case 'moving_to_dropoff': this._handleMoving(amr, dt, 'releasing'); break;
      case 'releasing':         this._handleReleasing(amr, dt); break;
      case 'returning_home':    this._handleReturningHome(amr, dt); break;
    }
    amr.blinkTimer += dt;
  },

  _getAssignedPickups() {
    const assigned = new Set();
    for (const amr of state.amrs) {
      // Pickupの重複割当は「Pickupへ向かっている最中」のAMRのみを対象にする。
      // ドッキング開始後（在庫消費後）やDropOff搬送中は予約解除扱いとする。
      if (amr.state === 'moving_to_pickup' && amr.assignedPickup) {
        assigned.add(amr.assignedPickup);
      }
    }
    return assigned;
  },

  _getReservedHomes(excludeAmrId = null) {
    const reserved = new Set();
    for (const amr of state.amrs) {
      if (excludeAmrId && amr.id === excludeAmrId) continue;
      if (amr.targetHomeId) reserved.add(amr.targetHomeId);
      const node = state.nodes.get(amr.currentNodeId);
      if (node && node.type === 'home' && amr.state === 'at_home') reserved.add(node.id);
    }
    return reserved;
  },

  _tryStartReturnHome(amr) {
    const reservedHomes = this._getReservedHomes(amr.id);
    const homePath = pathfinder.findToHome(amr.currentNodeId, reservedHomes);
    if (!homePath || homePath.length === 0) {
      amr.state = 'returning_home';
      amr.currentPath = null;
      amr.pathIndex = 0;
      amr.targetHomeId = null;
      return false;
    }
    const targetHomeId = homePath[homePath.length - 1];
    amr.state = 'returning_home';
    amr.currentPath = homePath;
    amr.pathIndex = 1;
    amr.targetHomeId = targetHomeId;
    if (homePath.length > 1) this._startSegment(amr);
    return true;
  },

  _handleAtHome(amr) {
    const assignedPickups = this._getAssignedPickups();
    const path = pathfinder.findNearestPickupFromHome(amr.currentNodeId, assignedPickups);
    if (path) {
      amr.assignedPickup = path[path.length - 1];
      amr.targetHomeId = null;
      amr.state = 'moving_to_pickup';
      amr.currentPath = path;
      amr.pathIndex = 1;
      this._startSegment(amr);
    }
  },

  _handleDocking(amr, dt) {
    amr.waitTimer += dt;
    if (amr.waitTimer >= state.config.dockingTime) {
      amr.hasCargo = true;
      amr.waitTimer = 0;
      const path = pathfinder.findNearestDropoffOnLoop(amr.currentNodeId);
      if (path && path.length > 0) {
        amr.assignedDropoff = path[path.length - 1];
        amr.state = 'moving_to_dropoff';
        amr.currentPath = path;
        amr.pathIndex = 1;
        if (path.length > 1) this._startSegment(amr);
      } else {
        // DropOffなし（設定エラー）
        amr.state = 'at_home';
        amr.hasCargo = false;
      }
    }
  },

  _handleReturningHome(amr, dt) {
    if (!amr.currentPath || amr.pathIndex >= amr.currentPath.length) {
      if (!this._tryStartReturnHome(amr)) {
        amr.totalWaitingTime += dt;
        return;
      }
    }
    this._handleMoving(amr, dt, 'at_home');
  },

  _handleReleasing(amr, dt) {
    amr.waitTimer += dt;
    if (amr.waitTimer >= state.config.releaseTime) {
      amr.hasCargo = false;
      amr.waitTimer = 0;
      amr.taskCount++;
      state.totalDeliveries++;
      amr.assignedDropoff = null;

      // 次のPickupを探す（ループ上から直接）
      const assignedPickups = this._getAssignedPickups();
      const path = pathfinder.findNearestPickupOnLoop(amr.currentNodeId, assignedPickups);
      if (path) {
        amr.assignedPickup = path[path.length - 1];
        // サイクルタイム記録（前回Pickup到着→今回Pickup到着の間は「現在」のサイクルで、
        // 次のPickup到着で計測されるので、ここではStartを更新しない）
        amr.state = 'moving_to_pickup';
        amr.currentPath = path;
        amr.pathIndex = 1;
        if (path.length > 1) this._startSegment(amr);
        else {
          // 既にPickupにいる（同じノード）
          this._onPickupArrival(amr);
        }
      } else {
        // 在庫ありのPickupが存在しない/割当不可 → Homeへ退避
        amr.assignedPickup = null;
        this._tryStartReturnHome(amr);
      }
    }
  },

  _onPickupArrival(amr) {
    if (!this._hasCartAtPickup(amr.currentNodeId)) {
      amr.assignedPickup = null;
      this._tryStartReturnHome(amr);
      return;
    }
    this._consumePickupCart(amr.currentNodeId);
    amr.assignedPickup = null;

    // サイクルタイム計測
    if (amr.cycleStartTime !== null) {
      const ct = state.simTime - amr.cycleStartTime;
      amr.totalCycleTime += ct;
      // 初回（Home→Pickup）は記録しない
      if (amr.taskCount > 0) {
        state.cycleRecords.push({
          amrId: amr.id,
          cycleNumber: amr.taskCount,
          totalCycleTime: ct
        });
      }
    }
    amr.cycleStartTime = state.simTime;
    amr.state = 'docking';
    amr.waitTimer = 0;
  },

  _recoverFromMovementStall(amr, nextState) {
    if (amr.currentSegment) return;
    collisionManager.releaseAll(amr.id);

    if (nextState === 'docking') {
      if (amr.assignedPickup && this._hasCartAtPickup(amr.assignedPickup)) {
        const path = pathfinder.findLoopPath(amr.currentNodeId, [amr.assignedPickup]);
        if (path && path.length > 1) {
          amr.currentPath = path;
          amr.pathIndex = 1;
          this._startSegment(amr);
          return;
        }
      }
      amr.assignedPickup = null;
      this._tryStartReturnHome(amr);
      return;
    }

    if (nextState === 'releasing') {
      if (amr.assignedDropoff) {
        const path = pathfinder.findLoopPath(amr.currentNodeId, [amr.assignedDropoff]);
        if (path && path.length > 1) {
          amr.currentPath = path;
          amr.pathIndex = 1;
          this._startSegment(amr);
        }
      }
      return;
    }

    if (nextState === 'at_home') {
      this._tryStartReturnHome(amr);
    }
  },

  _handleMovementStall(amr, dt, nextState) {
    amr.totalWaitingTime += dt;
    amr.waitDeadlockTimer += dt;
    if (amr.waitDeadlockTimer >= 5) {
      this._recoverFromMovementStall(amr, nextState);
      amr.waitDeadlockTimer = 0;
    }
  },

  _handleMoving(amr, dt, nextState) {
    if (!amr.currentPath || amr.pathIndex >= amr.currentPath.length) {
      this._onPathComplete(amr, nextState);
      return;
    }

    const targetId = amr.currentPath[amr.pathIndex];
    const target = state.nodes.get(targetId);
    if (!target) { amr.pathIndex++; return; }

    // セグメント確保チェック
    if (!amr.currentSegment) {
      this._startSegment(amr);
      if (!amr.currentSegment) {
        // 待機中
        this._handleMovementStall(amr, dt, nextState);
        return;
      }
    }
    amr.waitDeadlockTimer = 0;

    const speed = state.config.amrSpeed;
    const movePx = (speed * dt) / state.config.scale;
    const dx = target.x - amr.x, dy = target.y - amr.y;
    const distToTarget = Math.hypot(dx, dy);

    if (distToTarget <= movePx) {
      const blockingArea = this._getBlockingSyncArea(amr, target.x, target.y);
      if (blockingArea) {
        this._handleSyncAreaBlocked(amr, dt, blockingArea);
        this._handleMovementStall(amr, dt, nextState);
        return;
      }
      // ノード到着
      amr.x = target.x;
      amr.y = target.y;
      amr.syncBlockTimer = 0;
      this._updateSyncAreaOccupancy(amr, amr.x, amr.y);
      amr.currentNodeId = targetId;
      collisionManager.release(amr.id, amr.currentSegment);
      amr.currentSegment = null;
      amr.pathIndex++;

      if (amr.pathIndex >= amr.currentPath.length) {
        this._onPathComplete(amr, nextState);
      } else {
        this._startSegment(amr);
      }
    } else {
      const ratio = movePx / distToTarget;
      const nx = amr.x + dx * ratio;
      const ny = amr.y + dy * ratio;
      const blockingArea = this._getBlockingSyncArea(amr, nx, ny);
      if (blockingArea) {
        this._handleSyncAreaBlocked(amr, dt, blockingArea);
        this._handleMovementStall(amr, dt, nextState);
        return;
      }
      amr.x = nx;
      amr.y = ny;
      amr.syncBlockTimer = 0;
      this._updateSyncAreaOccupancy(amr, amr.x, amr.y);
      amr.direction = Math.atan2(dy, dx);
    }
  },

  _onPathComplete(amr, nextState) {
    collisionManager.releaseAll(amr.id);
    amr.currentSegment = null;
    amr.currentPath = null;

    if (nextState === 'docking') {
      this._onPickupArrival(amr);
    } else if (nextState === 'releasing') {
      amr.state = 'releasing';
      amr.waitTimer = 0;
    } else if (nextState === 'at_home') {
      amr.state = 'at_home';
      amr.assignedPickup = null;
      amr.targetHomeId = amr.currentNodeId;
    }
  },

  _startSegment(amr) {
    if (!amr.currentPath || amr.pathIndex >= amr.currentPath.length) return;
    const prevIdx = amr.pathIndex - 1;
    const fromId = prevIdx >= 0 ? amr.currentPath[prevIdx] : amr.currentNodeId;
    const toId = amr.currentPath[amr.pathIndex];
    const seg = graphManager.getSegmentBetween(fromId, toId);
    if (!seg || !graphManager.canTraverse(seg, fromId, toId)) { amr.pathIndex++; return; }

    const targetNode = state.nodes.get(toId);
    if (targetNode && this._getBlockingSyncArea(amr, targetNode.x, targetNode.y)) {
      amr.currentSegment = null;
      return;
    }

    if (collisionManager.tryReserve(amr.id, seg.id)) {
      amr.currentSegment = seg.id;
      const target = state.nodes.get(toId);
      if (target) amr.direction = Math.atan2(target.y - amr.y, target.x - amr.x);
    } else {
      amr.currentSegment = null;
    }
  }
};

// ============================================================
// UI - Canvas Renderer
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const renderer = {
  resize() {
    const rect = document.getElementById('right-pane').getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
  },

  render() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // 背景
    if (state.bgImage) {
      const img = state.bgImage;
      const sc = Math.min(w / img.width, h / img.height);
      const iw = img.width * sc, ih = img.height * sc;
      ctx.drawImage(img, (w - iw) / 2, (h - ih) / 2, iw, ih);
    } else {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#444';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('📷 画像を読み込むか、ノードを配置してください', w / 2, h / 2);
    }

    // セグメント描画
    for (const area of state.syncAreas) {
      if (area.points.length < 3) continue;
      ctx.beginPath();
      ctx.moveTo(area.points[0].x, area.points[0].y);
      for (let i = 1; i < area.points.length; i++) ctx.lineTo(area.points[i].x, area.points[i].y);
      ctx.closePath();
      ctx.fillStyle = area.occupantAmrId ? 'rgba(250,204,21,0.22)' : 'rgba(250,204,21,0.12)';
      ctx.fill();
      ctx.strokeStyle = area.occupantAmrId ? '#f59e0b' : '#facc15';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      const cx = area.points.reduce((s, p) => s + p.x, 0) / area.points.length;
      const cy = area.points.reduce((s, p) => s + p.y, 0) / area.points.length;
      ctx.fillStyle = '#fde68a';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`SyncArea (${area.occupantAmrId ? '使用中' : '空き'})`, cx, cy);
    }

    for (const seg of state.segments.values()) {
      const a = state.nodes.get(seg.from), b = state.nodes.get(seg.to);
      if (!a || !b) continue;

      const isLoop = state.loopSegments.has(seg.id);
      const isHome = state.homeSegments.has(seg.id);
      const isReserved = state.segmentReservation.has(seg.id);

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);

      if (isReserved) {
        ctx.setLineDash([]);
        ctx.strokeStyle = 'rgba(249,115,22,0.7)';
        ctx.lineWidth = 4;
      } else if (isLoop) {
        ctx.setLineDash([]);
        ctx.strokeStyle = 'rgba(74,222,128,0.7)';
        ctx.lineWidth = 2.5;
      } else if (isHome) {
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = 'rgba(96,165,250,0.7)';
        ctx.lineWidth = 2;
      } else {
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = 'rgba(150,150,150,0.5)';
        ctx.lineWidth = 1.5;
      }
      ctx.stroke();
      ctx.setLineDash([]);

      if (seg.direction !== 'bidirectional') {
        const isForward = seg.direction === 'forward';
        const fromNode = isForward ? a : b;
        const toNode = isForward ? b : a;
        this._drawDirectionArrow(fromNode.x, fromNode.y, toNode.x, toNode.y, isReserved ? '#fb923c' : '#f8fafc');
      }

      // 距離ラベル
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      ctx.fillStyle = isLoop ? '#86efac' : (isHome ? '#93c5fd' : '#aaa');
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(seg.distance.toFixed(1) + 'm', mx, my - 6);
    }

    // ループ作成プレビュー
    const ih = inputHandler;
    if (ih.loopPathNodes.length > 0 && ih.currentTool === 'loop-path') {
      ctx.setLineDash([5, 5]);
      ctx.strokeStyle = '#e94560';
      ctx.lineWidth = 2;
      for (let i = 0; i < ih.loopPathNodes.length - 1; i++) {
        const na = state.nodes.get(ih.loopPathNodes[i]);
        const nb = state.nodes.get(ih.loopPathNodes[i + 1]);
        if (na && nb) {
          ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y); ctx.stroke();
        }
      }
      if (ih.mouseX !== null) {
        const last = state.nodes.get(ih.loopPathNodes[ih.loopPathNodes.length - 1]);
        if (last) {
          ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(ih.mouseX, ih.mouseY); ctx.stroke();
        }
      }
      ctx.setLineDash([]);
    }

    // Home枝作成プレビュー
    if (ih.currentTool === 'home-branch' && ih.homeBranchSource) {
      const src = state.nodes.get(ih.homeBranchSource);
      if (src && ih.mouseX !== null) {
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(src.x, src.y);
        ctx.lineTo(ih.mouseX, ih.mouseY);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // スケール校正プレビュー
    if (ih.scalePoints.length === 1) {
      const p = ih.scalePoints[0];
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#e94560'; ctx.fill();
      if (ih.mouseX !== null) {
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(ih.mouseX, ih.mouseY);
        ctx.strokeStyle = '#e94560'; ctx.lineWidth = 1; ctx.stroke();
        ctx.setLineDash([]);
        const d = Math.hypot(ih.mouseX - p.x, ih.mouseY - p.y);
        ctx.fillStyle = '#e94560'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(`${d.toFixed(0)} px`, (p.x + ih.mouseX) / 2, (p.y + ih.mouseY) / 2 - 10);
      }
    }

    // ノード描画
    for (const n of state.nodes.values()) {
      this._drawNode(n);
    }

    // AMR描画
    for (const amr of state.amrs) {
      this._drawAMR(amr);
    }

    // Home枝接続: 選択中ノードのハイライト
    if (ih.currentTool === 'home-branch' && ih.homeBranchSource) {
      const src = state.nodes.get(ih.homeBranchSource);
      if (src) {
        ctx.beginPath();
        ctx.arc(src.x, src.y, 18, 0, Math.PI * 2);
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2;
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // ループ作成: 始点ハイライト
    if (ih.currentTool === 'loop-path' && ih.loopPathNodes.length > 0) {
      const startNode = state.nodes.get(ih.loopPathNodes[0]);
      if (startNode) {
        ctx.beginPath();
        ctx.arc(startNode.x, startNode.y, 18, 0, Math.PI * 2);
        ctx.strokeStyle = '#e94560';
        ctx.lineWidth = 2;
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    if (ih.currentTool === 'sync-area' && ih.syncAreaPoints.length > 0) {
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = '#facc15';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ih.syncAreaPoints[0].x, ih.syncAreaPoints[0].y);
      for (let i = 1; i < ih.syncAreaPoints.length; i++) {
        ctx.lineTo(ih.syncAreaPoints[i].x, ih.syncAreaPoints[i].y);
      }
      if (ih.mouseX !== null) ctx.lineTo(ih.mouseX, ih.mouseY);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  },

  _drawDirectionArrow(ax, ay, bx, by, color) {
    const dx = bx - ax, dy = by - ay;
    const len = Math.hypot(dx, dy);
    if (len < 16) return;
    const ux = dx / len, uy = dy / len;
    const arrowLen = 10;
    const arrowWidth = 5;
    const tipX = ax + dx * 0.58;
    const tipY = ay + dy * 0.58;
    const baseX = tipX - ux * arrowLen;
    const baseY = tipY - uy * arrowLen;
    const px = -uy, py = ux;

    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(baseX + px * arrowWidth, baseY + py * arrowWidth);
    ctx.lineTo(baseX - px * arrowWidth, baseY - py * arrowWidth);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  },

  _drawNode(n) {
    ctx.save();
    ctx.textBaseline = 'middle';
    switch (n.type) {
      case 'pickup':
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(n.x - 10, n.y - 10, 20, 20);
        ctx.strokeStyle = '#166534'; ctx.lineWidth = 1.5;
        ctx.strokeRect(n.x - 10, n.y - 10, 20, 20);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('P', n.x, n.y);
        {
          const carts = state.pickupSupply.get(n.id)?.availableCarts ?? 0;
          ctx.beginPath();
          ctx.arc(n.x + 11, n.y - 11, 6, 0, Math.PI * 2);
          ctx.fillStyle = carts > 0 ? '#fde047' : '#64748b';
          ctx.fill();
          ctx.fillStyle = '#0f172a';
          ctx.font = 'bold 8px sans-serif';
          ctx.fillText(String(carts), n.x + 11, n.y - 11);
        }
        break;
      case 'dropoff':
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(n.x - 10, n.y - 10, 20, 20);
        ctx.strokeStyle = '#991b1b'; ctx.lineWidth = 1.5;
        ctx.strokeRect(n.x - 10, n.y - 10, 20, 20);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('D', n.x, n.y);
        break;
      case 'home':
        ctx.beginPath(); ctx.arc(n.x, n.y, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#3b82f6'; ctx.fill();
        ctx.strokeStyle = '#1e40af'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('H', n.x, n.y);
        break;
      case 'waypoint':
        ctx.beginPath(); ctx.arc(n.x, n.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#9ca3af'; ctx.fill();
        ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 1; ctx.stroke();
        break;
    }
    if (n.type !== 'waypoint') {
      ctx.fillStyle = '#ddd'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(n.label, n.x, n.y - 16);
    }
    ctx.restore();
  },

  _drawAMR(amr) {
    const isStation = amr.state === 'docking' || amr.state === 'releasing';
    if (isStation && Math.floor(amr.blinkTimer * 3) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // 台車（AMR後方）
    if (amr.hasCargo) {
      ctx.save();
      ctx.translate(amr.x, amr.y);
      ctx.rotate(amr.direction);
      ctx.fillStyle = '#666';
      ctx.fillRect(-20, -5, 9, 10);
      ctx.restore();
    }

    // AMR本体
    ctx.save();
    ctx.translate(amr.x, amr.y);
    ctx.rotate(amr.direction);
    ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fillStyle = amr.state === 'at_home' ? '#94a3b8' : '#f97316';
    ctx.fill();
    ctx.strokeStyle = amr.state === 'at_home' ? '#64748b' : '#c2410c';
    ctx.lineWidth = 1.5; ctx.stroke();
    // 方向矢印
    ctx.beginPath(); ctx.moveTo(7, 0); ctx.lineTo(11, -3); ctx.lineTo(11, 3); ctx.closePath();
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();

    ctx.globalAlpha = 1;

    // ラベル
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(amr.label, amr.x, amr.y - 12);

    // 状態テキスト
    let stateText = '';
    switch (amr.state) {
      case 'at_home':      stateText = '待機'; break;
      case 'docking':      stateText = 'Dock'; break;
      case 'releasing':    stateText = 'Rel'; break;
      case 'returning_home': stateText = '帰還'; break;
    }
    if (stateText) {
      ctx.fillStyle = '#4fc3f7'; ctx.font = '8px sans-serif';
      ctx.fillText(stateText, amr.x, amr.y + 18);
    }
  }
};

// ============================================================
// UI - Notification
// ============================================================
let notifTimer = null;
function showNotif(msg, type = 'error') {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ============================================================
// UI - Input Handler
// ============================================================
const inputHandler = {
  currentTool: 'select',
  loopPathNodes: [],         // ループ作成中の選択ノード列
  loopPathSegIds: [],        // ループ作成中に追加したセグメントID列
  homeBranchSource: null,    // Home枝接続の接続元ノードID
  syncAreaPoints: [],        // SyncArea作成中の頂点列
  scalePoints: [],
  draggingNode: null,
  mouseX: null,
  mouseY: null,

  init() {
    canvas.addEventListener('mousedown', e => this._onMouseDown(e));
    canvas.addEventListener('mousemove', e => this._onMouseMove(e));
    canvas.addEventListener('mouseup', () => { this.draggingNode = null; });
    canvas.addEventListener('contextmenu', e => this._onContextMenu(e));
    document.addEventListener('click', e => {
      if (!e.target.closest('#context-menu')) {
        document.getElementById('context-menu').style.display = 'none';
      }
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') this._onEscape();
    });
  },

  _getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  },

  _onEscape() {
    if (this.currentTool === 'loop-path' && this.loopPathNodes.length > 0) {
      // 作成中のセグメントを全て破棄
      for (const sid of this.loopPathSegIds) {
        graphManager.removeSegment(sid);
      }
      this.loopPathNodes = [];
      this.loopPathSegIds = [];
      showNotif('ループ作成をキャンセルしました', 'info');
      renderer.render();
    } else if (this.currentTool === 'home-branch' && this.homeBranchSource) {
      this.homeBranchSource = null;
      renderer.render();
    } else if (this.currentTool === 'sync-area' && this.syncAreaPoints.length > 0) {
      this.syncAreaPoints = [];
      showNotif('SyncArea作成をキャンセルしました', 'info');
      renderer.render();
    }
  },

  _onMouseDown(e) {
    if (e.button !== 0) return;
    const pos = this._getPos(e);
    const tool = this.currentTool;

    if (tool === 'select') {
      const node = graphManager.findNearNode(pos.x, pos.y);
      if (node) this.draggingNode = node;
    } else if (['pickup', 'dropoff', 'home', 'waypoint'].includes(tool)) {
      graphManager.addNode(tool, pos.x, pos.y);
      renderer.render();
    } else if (tool === 'loop-path') {
      this._handleLoopPathClick(pos);
    } else if (tool === 'home-branch') {
      this._handleHomeBranchClick(pos);
    } else if (tool === 'sync-area') {
      this._handleSyncAreaClick(pos);
    } else if (tool === 'delete') {
      const node = graphManager.findNearNode(pos.x, pos.y);
      if (node) { graphManager.removeNode(node.id); }
      else {
        const seg = graphManager.findNearSegment(pos.x, pos.y);
        if (seg) graphManager.removeSegment(seg.id);
        else {
          const areaIndex = state.syncAreas.findIndex(area => pointInPolygon(pos.x, pos.y, area.points));
          if (areaIndex >= 0) state.syncAreas.splice(areaIndex, 1);
        }
      }
      renderer.render();
    } else if (tool === 'scale') {
      this.scalePoints.push(pos);
      if (this.scalePoints.length === 2) {
        const [p1, p2] = this.scalePoints;
        this._scalePixelDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        document.getElementById('scale-modal').style.display = 'block';
        document.getElementById('scale-distance-input').value = '';
        document.getElementById('scale-distance-input').focus();
        this.scalePoints = [];
        this.currentTool = 'select';
        uiController.updateToolButtons();
      }
      renderer.render();
    }
  },

  _handleLoopPathClick(pos) {
    const node = graphManager.findNearNode(pos.x, pos.y);
    if (!node) return;

    if (this.loopPathNodes.length === 0) {
      // 始点として選択
      this.loopPathNodes = [node.id];
      showNotif(`始点: ${node.label} を選択。次のノードをクリックしてください`, 'info');
      renderer.render();
      return;
    }

    const startId = this.loopPathNodes[0];
    const lastId = this.loopPathNodes[this.loopPathNodes.length - 1];

    // 始点をクリック → 経路確定（閉路でなくても可）
    if (node.id === startId && this.loopPathNodes.length >= 2) {
      this.loopPathNodes = [];
      this.loopPathSegIds = [];
      showNotif('経路作成を確定しました', 'success');
      renderer.render();
      return;
    }

    // 同じノードを再クリック → 無視
    if (node.id === lastId) return;

    // 新しいノードへのセグメントを追加
    const result = graphManager.addLoopSegment(lastId, node.id);
    if (!result.ok) {
      showNotif(result.msg, 'error');
      return;
    }
    this.loopPathSegIds.push(result.seg.id);
    this.loopPathNodes.push(node.id);

    showNotif(`${node.label} を追加。継続してノード追加、または始点クリックで確定（現在${this.loopPathNodes.length}ノード）`, 'info');
    renderer.render();
  },

  _handleHomeBranchClick(pos) {
    const node = graphManager.findNearNode(pos.x, pos.y);
    if (!node) return;

    if (!this.homeBranchSource) {
      // 接続元選択（ループ部ノードのみ）
      const loopTypes = ['pickup', 'dropoff', 'waypoint'];
      if (!loopTypes.includes(node.type)) {
        showNotif('接続元はPickup/DropOff/Waypointを選択してください', 'error');
        return;
      }
      this.homeBranchSource = node.id;
      showNotif(`接続元: ${node.label} を選択。Homeノードをクリックしてください`, 'info');
      renderer.render();
    } else {
      // Homeノードを選択して接続
      if (node.id === this.homeBranchSource) {
        this.homeBranchSource = null;
        renderer.render();
        return;
      }
      const result = graphManager.addHomeSegment(this.homeBranchSource, node.id);
      if (!result.ok) {
        showNotif(result.msg, 'error');
      } else {
        showNotif(`Home枝を接続しました: ${state.nodes.get(this.homeBranchSource).label} → ${node.label}`, 'success');
      }
      this.homeBranchSource = null;
      renderer.render();
    }
  },

  _handleSyncAreaClick(pos) {
    if (this.syncAreaPoints.length === 0) {
      this.syncAreaPoints.push({ x: pos.x, y: pos.y });
      showNotif('SyncArea開始点を設定。頂点を追加し、始点を再クリックで確定', 'info');
      renderer.render();
      return;
    }

    const start = this.syncAreaPoints[0];
    const isClose = Math.hypot(pos.x - start.x, pos.y - start.y) <= 12;
    if (isClose && this.syncAreaPoints.length >= 3) {
      state.syncAreas.push({
        id: 'sa' + (++state.syncAreaCounter),
        points: [...this.syncAreaPoints],
        occupantAmrId: null
      });
      this.syncAreaPoints = [];
      showNotif('SyncAreaを作成しました', 'success');
      renderer.render();
      return;
    }

    this.syncAreaPoints.push({ x: pos.x, y: pos.y });
    showNotif(`頂点を追加しました（${this.syncAreaPoints.length}点）`, 'info');
    renderer.render();
  },

  _onMouseMove(e) {
    const pos = this._getPos(e);
    this.mouseX = pos.x;
    this.mouseY = pos.y;
    if (this.draggingNode) {
      this.draggingNode.x = pos.x;
      this.draggingNode.y = pos.y;
      graphManager.recalcDistances();
    }
    renderer.render();
  },

  _onContextMenu(e) {
    e.preventDefault();
    const pos = this._getPos(e);
    const node = graphManager.findNearNode(pos.x, pos.y);
    const seg = !node ? graphManager.findNearSegment(pos.x, pos.y) : null;
    if (node || seg) {
      const menu = document.getElementById('context-menu');
      menu.style.display = 'block';
      menu.style.left = e.clientX + 'px';
      menu.style.top = e.clientY + 'px';
      menu._target = node || seg;
      menu._isNode = !!node;
    }
  },

  _scalePixelDist: 0
};

// Context menu
document.querySelector('#context-menu .cm-item[data-action="delete"]').addEventListener('click', () => {
  const menu = document.getElementById('context-menu');
  if (menu._isNode) graphManager.removeNode(menu._target.id);
  else graphManager.removeSegment(menu._target.id);
  menu.style.display = 'none';
  renderer.render();
});

// Scale modal
document.getElementById('scale-ok').addEventListener('click', () => {
  const dist = parseFloat(document.getElementById('scale-distance-input').value);
  if (dist > 0 && inputHandler._scalePixelDist > 0) {
    state.config.scale = dist / inputHandler._scalePixelDist;
    document.getElementById('param-scale').value = state.config.scale.toFixed(4);
    graphManager.recalcDistances();
    renderer.render();
  }
  document.getElementById('scale-modal').style.display = 'none';
});

document.getElementById('segment-direction').addEventListener('change', e => {
  state.segmentDirectionMode = e.target.value;
  showNotif(`経路属性を ${e.target.selectedOptions[0].textContent} に設定しました`, 'info');
});
document.getElementById('scale-cancel').addEventListener('click', () => {
  document.getElementById('scale-modal').style.display = 'none';
});

// ============================================================
// UI - Controller
// ============================================================
const uiController = {
  init() {
    // ツールボタン
    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tool = btn.dataset.tool;
        if (tool === 'image') {
          document.getElementById('image-input').click();
          return;
        }
        inputHandler.currentTool = tool;
        inputHandler.loopPathNodes = [];
        inputHandler.loopPathSegIds = [];
        inputHandler.homeBranchSource = null;
        inputHandler.syncAreaPoints = [];
        inputHandler.scalePoints = [];
        this.updateToolButtons();
        renderer.render();
      });
    });

    // 画像読込
    document.getElementById('image-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const img = new Image();
      img.onload = () => { state.bgImage = img; renderer.render(); };
      img.src = URL.createObjectURL(file);
      e.target.value = '';
    });

    // パラメータ
    document.getElementById('param-speed').addEventListener('change', e => { state.config.amrSpeed = parseFloat(e.target.value) || 1.0; });
    document.getElementById('param-docking').addEventListener('change', e => { state.config.dockingTime = parseFloat(e.target.value) || 30; });
    document.getElementById('param-release').addEventListener('change', e => { state.config.releaseTime = parseFloat(e.target.value) || 20; });
    document.getElementById('param-amr-count').addEventListener('change', e => { state.config.amrCount = Math.min(10, Math.max(1, parseInt(e.target.value) || 1)); });
    document.getElementById('param-pickup-interval').addEventListener('change', e => {
      state.config.pickupSupplyInterval = Math.max(1, parseFloat(e.target.value) || 20);
      e.target.value = state.config.pickupSupplyInterval;
    });
    document.getElementById('param-scale').addEventListener('change', e => {
      state.config.scale = parseFloat(e.target.value) || 0.1;
      graphManager.recalcDistances();
      renderer.render();
    });
    document.getElementById('ff-speed-input').addEventListener('change', e => {
      state.config.ffSpeed = Math.max(2, Math.min(100, parseInt(e.target.value) || 3));
      e.target.value = state.config.ffSpeed;
      document.querySelector('#btn-fast-forward .btn-label').textContent = 'x' + state.config.ffSpeed;
    });

    // シミュレーション制御
    document.getElementById('btn-play-pause').addEventListener('click', () => this._togglePlayPause());
    document.getElementById('btn-fast-forward').addEventListener('click', () => this._toggleFastForward());
    document.getElementById('btn-reset').addEventListener('click', () => this._reset());

    // 左ペイン折りたたみ
    document.getElementById('toggle-pane').addEventListener('click', () => {
      const pane = document.getElementById('left-pane');
      pane.classList.toggle('collapsed');
      document.getElementById('toggle-pane').innerHTML =
        pane.classList.contains('collapsed') ? '&raquo;' : '&laquo;';
      setTimeout(() => { renderer.resize(); renderer.render(); }, 350);
    });

    window.addEventListener('resize', () => { renderer.resize(); renderer.render(); });
  },

  updateToolButtons() {
    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tool === inputHandler.currentTool);
    });
  },

  _validateForSim() {
    if (state.segments.size === 0) {
      showNotif('経路がありません。経路作成ツールでセグメントを追加してください', 'error');
      return false;
    }
    const homes = [...state.nodes.values()].filter(n => n.type === 'home');
    if (homes.length === 0) {
      showNotif('待機エリア（Home）を少なくとも1つ配置してください', 'error');
      return false;
    }
    const hasHomeWithBranch = homes.some(h => (state.adjacency.get(h.id) || new Set()).size > 0);
    if (!hasHomeWithBranch) {
      showNotif('待機エリアをループ部に接続してください（Home枝接続ツール⎇を使用）', 'error');
      return false;
    }
    const pickups = [...state.nodes.values()].filter(n => n.type === 'pickup');
    if (pickups.length === 0) {
      showNotif('Pickup Stationを少なくとも1つ配置してください', 'error');
      return false;
    }
    const dropoffs = [...state.nodes.values()].filter(n => n.type === 'dropoff');
    if (dropoffs.length === 0) {
      showNotif('DropOff Stationを少なくとも1つ配置してください', 'error');
      return false;
    }
    return true;
  },

  _togglePlayPause() {
    const btn = document.getElementById('btn-play-pause');
    if (!state.running) {
      if (!this._validateForSim()) return;
      if (state.amrs.length === 0) simEngine.init();
      state.running = true;
      state.paused = false;
      state.config.simSpeed = state._lastSpeed || 1;
      btn.querySelector('.tool-icon').textContent = '⏸';
      btn.querySelector('.btn-label').textContent = '一時停止';
      this._updateSpeedDisplay();
      lastTimestamp = performance.now();
      requestAnimationFrame(simLoop);
    } else {
      state.running = false;
      state.paused = true;
      state._lastSpeed = state.config.simSpeed;
      btn.querySelector('.tool-icon').textContent = '▶';
      btn.querySelector('.btn-label').textContent = '再生';
    }
  },

  _toggleFastForward() {
    const ffBtn = document.getElementById('btn-fast-forward');
    if (state.config.simSpeed > 1) {
      state.config.simSpeed = 1;
      ffBtn.classList.remove('active-ff');
    } else {
      state.config.simSpeed = state.config.ffSpeed;
      ffBtn.classList.add('active-ff');
      if (!state.running) {
        if (!this._validateForSim()) return;
        if (state.amrs.length === 0) simEngine.init();
        state.running = true;
        state.paused = false;
        const playBtn = document.getElementById('btn-play-pause');
        playBtn.querySelector('.tool-icon').textContent = '⏸';
        playBtn.querySelector('.btn-label').textContent = '一時停止';
        lastTimestamp = performance.now();
        requestAnimationFrame(simLoop);
      }
    }
    this._updateSpeedDisplay();
  },

  _reset() {
    state.running = false;
    state.paused = false;
    state.simTime = 0;
    state.totalDeliveries = 0;
    state.cycleRecords = [];
    state.amrs = [];
    state.segmentReservation.clear();
    state.pickupSupply.clear();
    for (const area of state.syncAreas) area.occupantAmrId = null;
    state.config.simSpeed = 1;
    state._lastSpeed = 1;
    const playBtn = document.getElementById('btn-play-pause');
    playBtn.querySelector('.tool-icon').textContent = '▶';
    playBtn.querySelector('.btn-label').textContent = '再生';
    document.getElementById('btn-fast-forward').classList.remove('active-ff');
    this._updateSpeedDisplay();
    this.updateStats();
    renderer.render();
  },

  _updateSpeedDisplay() {
    document.getElementById('speed-display').textContent = '現在: x' + state.config.simSpeed;
    document.getElementById('btn-fast-forward').classList.toggle('active-ff', state.config.simSpeed > 1);
  },

  updateStats() {
    const t = state.simTime;
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = Math.floor(t % 60);
    document.getElementById('stat-time').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById('stat-deliveries').textContent = state.totalDeliveries + ' 回';
    const pickupTotal = [...state.pickupSupply.values()].reduce((sum, s) => sum + s.availableCarts, 0);

    // サイクルレコードから平均を計算（初回サイクルは除く）
    const validRecords = state.cycleRecords;
    if (validRecords.length > 0) {
      const totalCT = validRecords.reduce((sum, r) => sum + r.totalCycleTime, 0);
      const avgCT = totalCT / validRecords.length;
      document.getElementById('stat-avg-ct').textContent = avgCT.toFixed(1) + ' 秒';
      const tp = t > 0 ? (state.totalDeliveries / t) * 3600 : 0;
      document.getElementById('stat-throughput').textContent = tp.toFixed(1) + ' 回/h';
    } else {
      document.getElementById('stat-avg-ct').textContent = '-- 秒';
      document.getElementById('stat-throughput').textContent = '-- 回/h';
    }

    // AMR詳細
    let detailHtml = '', overlayHtml = '';
    if (state.amrs.length > 0) {
      document.getElementById('overlay-stats').style.display = 'block';
      for (const amr of state.amrs) {
        const amrRecords = validRecords.filter(r => r.amrId === amr.id);
        const avgCT = amrRecords.length > 0
          ? (amrRecords.reduce((s, r) => s + r.totalCycleTime, 0) / amrRecords.length).toFixed(1)
          : '--';
        const waitPct = t > 0 ? ((amr.totalWaitingTime / t) * 100).toFixed(1) : '0.0';
        const stateJa = {
          at_home: '待機', moving_to_pickup: '→Pick', docking: 'Dock中',
          moving_to_dropoff: '→Drop', releasing: 'Rel中', returning_home: '帰還中'
        }[amr.state] || amr.state;
        const line = `${amr.label}[${stateJa}]: ${amr.taskCount}回 / 平均${avgCT}s / 待機${waitPct}%`;
        detailHtml += `<div class="amr-stat">${line}</div>`;
        overlayHtml += `<div class="os-row"><span class="os-label">${amr.label}</span><span class="os-value">${amr.taskCount}回 ${avgCT}s 待${waitPct}%</span></div>`;
      }
      detailHtml += `<div class="amr-stat">供給中の台車数: ${pickupTotal} 台</div>`;
    } else {
      document.getElementById('overlay-stats').style.display = 'none';
    }
    document.getElementById('stats-detail').innerHTML = detailHtml;
    document.getElementById('overlay-amr-stats').innerHTML = overlayHtml;
  }
};

// ============================================================
// MAIN LOOP
// ============================================================
let lastTimestamp = 0;
function simLoop(timestamp) {
  if (!state.running) return;
  const dtReal = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
  lastTimestamp = timestamp;
  const dtSim = dtReal * state.config.simSpeed;
  const fixedDt = 0.05;
  let remaining = dtSim;
  while (remaining > 0) {
    const step = Math.min(remaining, fixedDt);
    simEngine.update(step);
    remaining -= step;
  }
  renderer.render();
  uiController.updateStats();
  requestAnimationFrame(simLoop);
}

// ============================================================
// INIT
// ============================================================
renderer.resize();
renderer.render();
inputHandler.init();
uiController.init();
</script>
</body>
</html>
